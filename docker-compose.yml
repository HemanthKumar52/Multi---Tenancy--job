services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: applycopilot
      POSTGRES_PASSWORD: applycopilot
      POSTGRES_DB: applycopilot
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applycopilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  dbdata:
  redisdata:
